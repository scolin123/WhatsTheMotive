{% extends "base.html" %}

{% block title %}What's The Move?{% endblock %}

{% block content %}
<div class="hero">
  <div class="hero__badge">Decide together</div>

  <h1 class="hero__title">
    What's<br>The Motive?
  </h1>

  <p class="hero__tagline">
    Stop the endless group chat debate.<br>
    Create a room, vote on options, get moving.
  </p>

  <div class="hero__actions">
    <a href="{{ url_for('create_room_page') }}" class="btn btn--primary">
      <span class="btn__icon"></span> Create a Room
    </a>
    <a href="{{ url_for('join_room_page') }}" class="btn btn--secondary">
      Join a Room
    </a>
  </div>

</div>

<section id="nearby-section" class="nearby-section" hidden>
  <div class="nearby-section__inner">
    <h2 class="nearby-section__heading">Rooms near you</h2>
    <ul id="nearby-list" class="nearby-list"></ul>
  </div>
</section>

<script>
  (function () {
    if (!navigator.geolocation) return;

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    navigator.geolocation.getCurrentPosition(
      function (pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;

        fetch('/api/nearby-rooms?lat=' + lat + '&lng=' + lng, {
          headers: { 'Accept': 'application/json' }
        })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (!data || !data.rooms || data.rooms.length === 0) return;

          var section = document.getElementById('nearby-section');
          var list    = document.getElementById('nearby-list');

          list.innerHTML = data.rooms.map(function (room) {
            var displayName = escapeHtml(room.host_name) + "'s " + escapeHtml(room.title);
            return '<li class="nearby-item">' +
              '<div class="nearby-item__info">' +
                '<span class="nearby-item__title">' + displayName + '</span>' +
                '<span class="nearby-item__meta">Code: ' + escapeHtml(room.code) + '</span>' +
              '</div>' +
              '<a href="/join?code=' + encodeURIComponent(room.code) + '" class="btn btn--primary btn--small">Join</a>' +
            '</li>';
          }).join('');

          section.hidden = false;
        })
        .catch(function () {});
      },
      function () {},
      { timeout: 8000, maximumAge: 300000 }
    );
  })();
</script>
{% endblock %}
